# Render.com blueprint — optional one-click deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nora-says-english
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECURE_SSL
        value: "True"
      - key: DJANGO_SERVE_MEDIA
        value: "True"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
    disk:
      name: media
      mountPath: /opt/render/project/src/media
      sizeGB: 1
